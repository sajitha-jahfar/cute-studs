{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Signup - Cute-Studs</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .signup-box {
            background: white;
            padding: 30px;
            width: 360px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            color: #ff1493;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus {
            border-color: #ff69b4;
        }

        button {
            width: 95%;
            padding: 10px;
            background-color: #ff69b4;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #ff1493;
        }

        .footer {
            margin-top: 15px;
            font-size: 14px;
        }

        .footer a {
            text-decoration: none;
            color: #ff1493;
            font-weight: bold;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .error {
            color: red;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="signup-box">

    <h2>💖 Cute-Studs</h2>
    <p class="subtitle">Create your account</p>

    {% if form.errors %}
        <p class="error">Please fix the errors below</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password1" placeholder="Password" required>
        <input type="password" name="password2" placeholder="Confirm Password" required>

        <button type="submit">Register</button>
    </form>

    <div class="footer">
        Already have an account? <a href="/">Login</a>
    </div>

</div>

</body>
</html>
